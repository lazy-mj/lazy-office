<div class="site-header-placeholder"></div>

<section class="hero">
  <div class="hero-inner">
    <h1 class="wordmark"><span class="lazy">Lazy</span><span class="office">Office</span></h1>
    <p>반복 업무는 몇 번의 클릭으로, 필요한 자동화 도구를 한곳에.</p>
    <span class="lock-note">
      <svg class="icon-svg" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      데이터는 브라우저에서만 처리됩니다
    </span>
  </div>
</section>

<div class="content">
  <div class="module-grid">

    <a class="module-card c-navy" href="https://lazy-mj.github.io/lazy-billsplit/">
      <div class="icon">
        <svg class="icon-svg" viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" x2="8.12" y1="4" y2="15.88"/><line x1="14.47" x2="20" y1="14.48" y2="20"/><line x1="8.12" x2="12" y1="8.12" y2="12"/></svg>
      </div>
      <h3>전화요금 계정분할 자동화</h3>
      <p>부서별 전화요금을 계정번호별로 자동 분할·집계합니다.</p>
      <div class="cta-wrap"><span class="cta">바로가기
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </span></div>
    </a>

    <a class="module-card c-terracotta" href="https://lazy-mj.github.io/lazy-jeongsan/">
      <div class="icon">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      </div>
      <h3>예산 검증 도구</h3>
      <p>PMS와 이지바로/RCMS 예산을 비목별로 자동 대조합니다.</p>
      <div class="cta-wrap"><span class="cta">바로가기
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </span></div>
    </a>

    <div class="module-card suggest">
      <div class="icon">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
      </div>
      <h3>다음엔 어떤 자동화가 필요할까요?</h3>
      <p>다음에 만들면 좋을 업무를 제안해주세요.</p>
      <p class="suggest-contact">📨 문의 : 전민지</p>
    </div>

  </div>
